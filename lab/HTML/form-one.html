
<!DOCTYPE html>
<html>
<head>
    <title>Create Workspace</title>
</head>
<body>

    <h4>GET STARTED</h4>
    <h1>Create your workspace</h1>

    <form>

        <label for="fullname">Full name</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
        <br><br>

        <label for="phone">Phone number</label><br>
        <input type="tel" id="phone" name="phone" placeholder="55512345674">
        <br><br>

        <label for="dob">Date of birth</label><br>
        <input type="date" id="dob" name="dob" placeholder="25/06/2026">
        <br><br>

        <label for="email">Work email</label><br>
        <input type="email" id="email" name="email" placeholder="jane@company.com">
        <br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="At least 8 characters">
        <br><br>

        <input type="checkbox" id="updates" name="updates" checked>
        <label for="updates">Email me product updates and tips</label>
        <br><br>

        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I agree to the Terms & Privacy Policy</label>
        <br><br>

        <input type="submit" value="Create Workspace">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
