
<!DOCTYPE html>
<html>
<head>
    <title>Create Your Account</title>
</head>
<body>

    <h1>Create your account</h1>
    <p>Join us in a couple of steps.</p>

    <form>

        <label for="fullname">Full name</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
        <br><br>

        <label for="age">Age</label><br>
        <input type="number" id="age" name="age" placeholder="28">
        <br><br>

        <label for="dob">Date of birth</label><br>
        <input type="text" id="dob" name="dob" placeholder="25/06/2026">
        <br><br>

        <label for="email">Email address</label><br>
        <input type="email" id="email" name="email" placeholder="jane@example.com">
        <br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="••••••••">
        <br><br>

        <label>Preferred Contact</label><br><br>

        <input type="radio" id="emailcontact" name="contact" value="Email">
        <label for="emailcontact">Email</label>

        <input type="radio" id="phonecontact" name="contact" value="Phone">
        <label for="phonecontact">Phone</label>

        <input type="radio" id="smscontact" name="contact" value="SMS">
        <label for="smscontact">SMS</label>

        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
