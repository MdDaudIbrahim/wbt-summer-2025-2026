
<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <form>

        <h1>Registration</h1>
        <p>Please complete all fields below.</p>
        <hr>

        <table cellpadding="5">

            <tr>
                <td><label for="fullname">Full Name</label></td>
            </tr>

            <tr>
                <td>
                    <input type="text"
                           id="fullname"
                           name="fullname"
                           placeholder="Jane Doe"
                           size="50">
                </td>
            </tr>

            <tr>
                <td><label for="postal">Postal Code</label></td>
            </tr>

            <tr>
                <td>
                    <input type="number"
                           id="postal"
                           name="postal"
                           placeholder="10001"
                           size="50">
                </td>
            </tr>

            <tr>
                <td><label for="dob">Date Of Birth</label></td>
            </tr>

            <tr>
                <td>
                    <input type="text"
                           id="dob"
                           name="dob"
                           placeholder="25/06/2026"
                           size="50">
                </td>
            </tr>

            <tr>
                <td><label for="email">Email Address</label></td>
            </tr>

            <tr>
                <td>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="jane@example.com"
                           size="50">
                </td>
            </tr>

            <tr>
                <td><label for="password">Password</label></td>
            </tr>

            <tr>
                <td>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="********"
                           size="50">
                </td>
            </tr>

            <tr>
                <td><label for="country">Country</label></td>
            </tr>

            <tr>
                <td>
                    <select id="country" name="country">
                        <option>Select a country...</option>
                        <option>Bangladesh</option>
                        <option>India</option>
                        <option>USA</option>
                        <option>Canada</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="center">
                    <br>
                    <input type="submit" value="Submit">
                    &nbsp;&nbsp;
                    <input type="reset" value="Reset">
                </td>
            </tr>


        </table>

    </form>

</body>
</html>
