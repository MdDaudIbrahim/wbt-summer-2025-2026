
<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<form method="post">

    <fieldset>
        <legend>Student Registration Form</legend>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone">
        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        <br><br>

        <label for="department">Department:</label>
        <select id="department" name="department">
            <option value="cse">CSE</option>
            <option value="eee">EEE</option>
            <option value="bba">BBA</option>
        </select>
        <br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

<hr>

<!-- --------------------------------------------tr td way ----------------------------- -->
        <form>
                <table>

                <tr>
                    <td><label for="fullname">Full Name</label></td>
                    <td><input type="text" id="fullname" name="fullname"></td>
                </tr>

                <tr>
                    <td><label for="phone">Phone Number</label></td>
                    <td><input type="tel" id="phone" name="phone"></td>
                </tr>

                <tr>
                    <td><label for="dob">Date of Birth</label></td>
                    <td><input type="date" id="dob" name="dob"></td>
                </tr>

                <tr>
                    <td><label for="email">Work Email</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>

                <tr>
                    <td><label for="password">Password</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="checkbox" id="updates">
                        <label for="updates">Email me product updates and tips</label>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the Terms & Privacy Policy</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="submit" value="Create Workspace">
                    </td>
                    <td>
                        <input type="reset" value="Reset">
                    </td>
                </tr>

                <tr>
                    <td><label for="color">Favorite Color:</label></td>
                    <td><input type="color" id="color" name="color"></td>
                </tr>
                <tr>
                    <td><label for="file">File Upload:</label></td>
                    <td><input type="file" id="file" name="file"></td>
                </tr>

                </table>
                </form>

    </fieldset>

</form>

</body>
</html>
